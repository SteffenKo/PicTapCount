name: pictapcount
description: Fast offline mobile app for counting objects on photos.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0
  go_router: ^14.6.2
  image_picker: ^1.1.2
  uuid: ^4.5.1
  intl: ^0.20.0
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
